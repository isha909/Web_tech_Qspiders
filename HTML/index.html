  <!-- action tells where to store the data and method tells how to store the data  -->
   <!-- get less secure and post more secure  -->

<form action="home.html" method="get">

<!-- <form action="https:httpbin.org/post" method="post">  // (for post) -->
  <!-- for and id must be same to connect with each other -->

  <label for="fName">First Name</label> 
  <input type="text" id="fName" placeholder="Enter your first name" name="FName" required>
  <br><br>
  <label for="lName">Last Name</label>
  <input type="text" id="lName" placeholder="Enter your last name" name="LName" required>
  <br><br>
  <label for="email">Email</label>
  <input type="email" id="email" placeholder="Enter your email adddress" name="Email_id">
  <br><br>
  <label for="pass">Password</label>
  <input type="password" id="pass" name="Pass" minlength="3" maxlength="10" pattern="[A-Z a-z]">
  <br><br>
 
  <!-- to wrap content in a box use fieldset -->
  <fieldset> 
    <legend>Gender</legend>
    <label for="male">Male</label>
    <input type="radio" id="male" name="gender"> 
    <label for="female">Female</label>
    <input type="radio" id="female" name="gender">
    <label for="others">Others</label>
    <input type="radio" id="others" name="gender">
    <!-- name is same for all so that only one can be selected -->
  </fieldset>
  <br><br>

  <fieldset> 
    <legend>Types of buttons</legend>
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
    <br>
    <input type="submit" value="Submit button">
    <input type="reset" value="Reset button">
  </fieldset>
  <br><br>

  <fieldset>
    <legend>Skills</legend>
      <label for="html">HTML</label>
      <input type="checkbox" id="html">
      <label for="css">CSS</label>
      <input type="checkbox" id="css">
      <label for="js">JavaScript</label>
      <input type="checkbox" id="js">
      <label for="react">React</label>
      <input type="checkbox" id="react">
  </fieldset>
  <br><br>

  <!-- for large text area like address use textarea  -->
  <label for="address">Address</label>
  <textarea id="address"></textarea> 
  <br><br>


  <label for="country">Select Country</label>
  <select id="country">
    <option selected disabled>Select Country</option>
    <!-- value attribute is used so that in get method we can see the value selected in url  -->
    <option value="IN">India</option>
    <option>Sweden</option>
    <option>Scotland</option>
    <option>Australia</option>
    <option>France</option>
  </select>
  <br><br>

  <input type="file">
  <!-- to add only number in laptop we use number input type but in mobile phone we can add both number and alphabets -->
  <input type="number" placeholder="number..">
  <!-- to add both number and alphabet in laptop but can only add number in phones -->
  <input type="tel" placeholder="tel..">

</form>
